<!DOCTYPE html>
<html>
<head>
<title>GAWE SOAL YUK</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-10">

<div class="bg-white p-6 rounded shadow max-w-xl mx-auto">

<h1 class="text-2xl font-bold mb-4">Generator Paket Soal</h1>

<div class="space-y-3">

<input id="seed" type="number" value="12345" class="border p-2 w-full">

<input id="jumlah" type="number" value="20" class="border p-2 w-full">

<select id="paket" class="border p-2 w-full">
<option value="1">1 Paket</option>
<option value="2">2 Paket</option>
<option value="3">3 Paket</option>
</select>

<button onclick="generate()" class="bg-blue-600 text-white px-4 py-2 rounded w-full">
Generate Soal
</button>

<hr>

<form id="uploadForm">
<input type="file" name="file" required class="border p-2 w-full">
<button class="bg-green-600 text-white px-4 py-2 rounded w-full mt-2">
Upload Excel
</button>
</form>

</div>

<div id="result" class="mt-4"></div>

</div>

<script>

document.getElementById("uploadForm").addEventListener("submit",async e=>{

e.preventDefault();

const formData=new FormData(e.target);

const res=await fetch("/import-excel",{method:"POST",body:formData});

const text=await res.text();

alert(text);

});

async function generate(){

const seed = parseInt(document.getElementById("seed").value);
const jumlah = parseInt(document.getElementById("jumlah").value);
const paket = parseInt(document.getElementById("paket").value);

const res = await fetch("/generate",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({seed,jumlah,paket})
});

const data = await res.json();

const div = document.getElementById("result");

div.innerHTML="";

if(!data.success){
alert("Generate gagal");
return;
}

data.files.forEach(f=>{
div.innerHTML += `<a href="/download/${f}" class="block text-blue-600">${f}</a>`;
});

}

</script>

</body>
</html>
